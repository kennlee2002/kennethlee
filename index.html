<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李俊靖 Kenneth Lee - 數位多媒體系 - 個人特色介紹</title>
    <style>
        /* CSS 變量 - LinkedIn 配色方案 */
        :root {
            --linkedin-blue: #0a66c2;
            --linkedin-light-blue: #70b5f9;
            --linkedin-grey-bg: #f3f2ef;
            --linkedin-dark-grey: #666666;
            --linkedin-text: #000000e6;
            --linkedin-link: #0073b1;
            --white: #ffffff;
            --font-family: system-ui, -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", "Fira Sans", "Ubuntu", "Oxygen", "Oxygen-Sans", Cantarell, "Droid Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
        }

        /* 全局樣式 */
        body {
            font-family: var(--font-family);
            background-color: var(--linkedin-grey-bg);
            margin: 0;
            color: var(--linkedin-text);
            display: flex;
            justify-content: center;
            padding-top: 20px;
        }

        a {
            text-decoration: none;
            color: var(--linkedin-link);
        }

        h1, h2, h3 {
            margin: 0;
            font-weight: 600;
        }

        /* 主容器 */
        .main-container {
            width: 100%;
            max-width: 1128px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
